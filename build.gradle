plugins {
    id 'fabric-loom' version '1.1.14'
    id 'maven-publish'
}

group = 'de.madmaxzaster'
version = '1.0.0'

repositories {
    mavenCentral()
    maven { url = 'https://maven.fabricmc.net/' }
    maven { url = 'https://repo.maven.apache.org/maven2' }
}

dependencies {
    minecraft 'com.mojang:minecraft:1.20.4'
    mappings(loom.officialMojangMappings())
    modImplementation 'net.fabricmc:fabric-loader:0.14.24'
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.95.4+1.20.4'
}

java {
    sourceCompatibility = '17'
    targetCompatibility = '17'
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.encoding = 'UTF-8'
}

processResources {
    inputs.property 'version', project.version
    inputs.property 'id', project.name
    filesMatching('fabric.mod.json') {
        expand 'version': project.version, 'id': project.name
    }
}
